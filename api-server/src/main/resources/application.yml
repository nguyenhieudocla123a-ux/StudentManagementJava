spring:
  application:
    name: student-management-api

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=QuanLyDiemSinhVien_V2;encrypt=false;trustServerCertificate=true
    username: sa
    password: 123456789
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    com.studentmanagement: DEBUG
    org.hibernate.SQL: DEBUG
